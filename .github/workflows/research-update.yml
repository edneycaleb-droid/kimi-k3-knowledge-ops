name: Repository quality and read-only research policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "43 6 * * 1,4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout metadata repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Run deterministic offline quality gate
        run: python scripts/check_repository_quality.py
      - name: Validate research boundaries
        shell: bash
        run: |
          set -euo pipefail
          test -f sources/official.yml
          test -f SECURITY.md
          test -f releases/baseline.yml
          grep -q "execute_discovered_code: false" sources/official.yml
          grep -q "install_discovered_code: false" sources/official.yml
          echo "Validation only: discovered upstream code is not executed or installed."
