
name: dlt verified GitHub ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "19 */6 * * *"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dlt with DuckDB workspace
        run: python -m pip install -r requirements-dlt.txt
      - name: Initialize official verified GitHub source
        run: dlt --non-interactive --yes --disable-telemetry init github duckdb
      - name: Load seed-repository events incrementally
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python pipelines/github_verified_pipeline.py
      - name: Upload DuckDB research artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-intelligence-${{ github.run_id }}
          path: knowledge_ops.duckdb
          if-no-files-found: error
          retention-days: 14
