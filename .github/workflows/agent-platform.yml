
name: Agent platform quality

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install repository
        run: python -m pip install -e .
      - name: Compile
        run: python -m compileall -q src pipelines scripts tests
      - name: Unit and end-to-end tests
        run: python -m unittest discover -s tests -v
      - name: Ten-control quality gate
        run: python scripts/quality_gate.py
      - name: Fail-closed security gate
        run: python scripts/security_gate.py
